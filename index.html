<!DOCTYPE html>
<html lang="en" x-data="{ lang: 'en', scrolled: false }" @scroll.window="scrolled = (window.pageYOffset > 50)" :dir="lang === 'ar' ? 'rtl' : 'ltr'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KHALID | Computer Science & Software Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.3/cdn.min.js" defer></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap');
        
        :root { --accent: #6366f1; --accent-bright: #818cf8; --bg-deep: #02040a; --sky-blue: #0ea5e9; --purple-glow: #a855f7; }

        body { 
            background-color: var(--bg-deep); 
            color: #e2e8f0; 
            font-family: 'Space Grotesk', 'Cairo', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
            width: 100%;
        }

        .grid-bg {
            background-image: linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            position: fixed; inset: 0; z-index: -1;
        }

        /* الإطارات المتحركة */
        .live-border {
            position: relative;
            border-radius: 2.5rem;
            background: rgba(13, 17, 23, 0.8);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .live-border::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            animation: rotateSky 5s linear infinite;
            z-index: 0;
        }
        .border-sky::before { background: conic-gradient(transparent, transparent, transparent, var(--sky-blue)); }
        .border-purple::before { background: conic-gradient(transparent, transparent, transparent, var(--purple-glow)); }
        
        .live-border::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: #0d1117;
            border-radius: calc(2.5rem - 2px);
            z-index: 1;
        }
        .inner-content { position: relative; z-index: 2; }
        
        @keyframes rotateSky { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .cv-download-btn {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--accent);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        .cv-download-btn:hover {
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -10px var(--accent);
        }

        .interactive-card {
            background: rgba(13, 17, 23, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .interactive-card:hover { transform: translateY(-10px); border-color: var(--accent); }

        .stars-wrapper { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 4rem; }
        .star-particle {
            position: absolute; background: white; border-radius: 50%; opacity: 0;
            animation: star-sparkle 3s infinite ease-in-out;
        }
        @keyframes star-sparkle { 0%, 100% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); opacity: 0.7; } }

        .progress-bar {
            position: fixed; top: 0; left: 0; height: 4px; background: linear-gradient(to right, #6366f1, #0ea5e9);
            z-index: 100; transition: width 0.1s;
        }

        .glow-text {
            background: linear-gradient(135deg, #fff 0%, var(--accent-bright) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        [dir="rtl"] { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body x-init="AOS.init({duration: 1000, once: true})">

    <div class="grid-bg"></div>
    <div class="progress-bar" id="myBar"></div>

    <nav class="fixed w-full z-50 transition-all duration-300" :class="scrolled ? 'py-4 bg-black/80 backdrop-blur-md border-b border-white/10' : 'py-8 bg-transparent'">
        <div class="max-w-7xl mx-auto px-8 flex justify-between items-center">
            <div class="text-3xl font-black tracking-tighter glow-text">KHALID</div>
            <div class="flex items-center gap-4">
                <a href="https://drive.google.com/file/d/1rlRl18B3SNN7mGEjRzeJtA7H5CtMSdRz/view?usp=sharing" target="_blank" class="hidden md:flex cv-download-btn px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest items-center gap-2">
                    <i class="fas fa-file-download"></i> CV
                </a>
                <button @click="lang = (lang === 'en' ? 'ar' : 'en')" class="bg-white/5 border border-white/10 px-6 py-2 rounded-full text-xs font-bold uppercase flex items-center gap-2">
                    <i class="fas fa-globe"></i>
                    <span x-text="lang === 'en' ? 'العربية' : 'English'"></span>
                </button>
            </div>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center px-8 text-center relative">
        <div data-aos="zoom-in">
            <h1 class="text-6xl md:text-9xl font-black mb-8 leading-none">
                <span x-show="lang === 'en'">KHALID <span class="glow-text">ALHARBI</span></span>
                <span x-show="lang === 'ar'">خالد <span class="glow-text">الحربي</span></span>
            </h1>
            <p class="text-xl md:text-2xl text-slate-400 font-light max-w-4xl mx-auto leading-relaxed mb-10" 
               x-text="lang === 'en' ? 'I am highly motivated to develop my technical expertise in computer science while expanding my knowledge in related fields to enhance my professional growth.' : 'لدي دافع قوي لتطوير خبراتي التقنية في علوم الحاسب مع توسيع آفاق معرفتي في المجالات ذات الصلة لتعزيز نموي المهني.'"></p>
            
            <a href="https://drive.google.com/file/d/1rlRl18B3SNN7mGEjRzeJtA7H5CtMSdRz/view?usp=sharing" target="_blank" class="cv-download-btn px-10 py-4 rounded-full font-bold flex items-center gap-3 mx-auto w-fit">
                <i class="fas fa-cloud-download-alt text-xl"></i>
                <span x-text="lang === 'en' ? 'Download Full CV' : 'تحميل السيرة الذاتية'"></span>
            </a>
        </div>
    </section>

    <section class="py-24 px-8 max-w-6xl mx-auto">
        <div class="grid md:grid-cols-2 gap-12 items-center">
            <div data-aos="fade-right">
                <h2 class="text-4xl font-bold mb-8 glow-text" x-text="lang === 'en' ? 'Core Profile' : 'الملف الشخصي'"></h2>
                <p class="text-slate-400 text-lg leading-relaxed mb-8" 
                   x-text="lang === 'en' ? 'Ambitious Bachelor student in Computer Science. Proficient in systems analysis, programming, and graphic design, with a national award in public speaking.' : 'طالب بكالوريوس طموح في علوم الحاسب. متمكن من تحليل الأنظمة والبرمجة والتصميم الجرافيكي، وحاصل على جائزة وطنية في الخطابة.'"></p>
                
                <div class="inline-flex items-center gap-3 bg-indigo-500/10 border border-indigo-500/20 px-6 py-3 rounded-2xl">
                    <i class="fas fa-language text-indigo-400 text-xl"></i>
                    <span class="text-white font-bold text-sm" x-text="lang === 'en' ? 'Arabic / English' : 'عربي / انقليزي'"></span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-6" data-aos="fade-left">
                <div class="interactive-card p-10 rounded-3xl border-l-8 border-indigo-500 text-center">
                    <div class="text-4xl font-black text-white mb-2">A+</div>
                    <div class="text-[10px] uppercase text-slate-500 tracking-widest font-bold" x-text="lang === 'en' ? 'Graduation Grade' : 'درجة مشروع التخرج'"></div>
                </div>
                <div class="interactive-card p-10 rounded-3xl border-l-8 border-indigo-500 text-center">
                    <div class="text-2xl font-black text-white mb-2" x-text="lang === 'en' ? '2nd Place' : 'المركز الثاني'"></div>
                    <div class="text-[9px] uppercase text-slate-500 tracking-widest font-bold" x-text="lang === 'en' ? 'National Level' : 'على مستوى المملكة'"></div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-20 px-8 max-w-5xl mx-auto">
        <h2 class="text-3xl font-bold mb-12 glow-text text-center" x-text="lang === 'en' ? 'Professional Experience' : 'الخبرات العملية'"></h2>
        <div class="live-border border-sky" data-aos="fade-up">
            <div class="inner-content p-10 md:p-14">
                <div class="flex flex-col md:flex-row justify-between items-start mb-6">
                    <div>
                        <h3 class="text-2xl font-bold text-white mb-1" x-text="lang === 'en' ? 'Muezzin' : 'مؤذن'"></h3>
                        <p class="text-sky-400 font-bold" x-text="lang === 'en' ? 'Ministry of Islamic Affairs' : 'وزارة الشؤون الإسلامية والدعوة والإرشاد'"></p>
                    </div>
                    <span class="text-slate-500 font-bold mt-4 md:mt-0">2024 — PRESENT</span>
                </div>
                <div class="grid md:grid-cols-2 gap-8 text-slate-400 text-sm leading-relaxed">
                    <p x-text="lang === 'en' ? '• Precision and punctuality in daily scheduling and organization.' : '• الدقة والانضباط العالي في تنظيم المهام اليومية والالتزام بالوقت.'"></p>
                    <p x-text="lang === 'en' ? '• Enhanced interpersonal skills through daily community interaction.' : '• تعزيز مهارات التواصل الفعال من خلال الاحتكاك اليومي بأفراد المجتمع.'"></p>
                </div>
            </div>
        </div>
    </section>

    <section class="py-20 px-8 max-w-5xl mx-auto">
        <h2 class="text-3xl font-bold mb-12 glow-text text-center" x-text="lang === 'en' ? 'National Achievement' : 'الإنجاز الوطني'"></h2>
        <div class="live-border border-purple" data-aos="fade-up">
            <div class="inner-content p-10 md:p-14">
                <div class="flex items-center gap-8">
                    <div class="hidden md:flex bg-purple-500/10 p-6 rounded-3xl border border-purple-500/20">
                        <i class="fas fa-award text-4xl text-purple-400"></i>
                    </div>
                    <div>
                        <h3 class="text-2xl font-bold text-white mb-3" x-text="lang === 'en' ? 'National Public Speaking Excellence' : 'التفوق الوطني في فن المشافهة'"></h3>
                        <p class="text-slate-400 leading-relaxed" x-text="lang === 'en' ? 'Achieved 2nd place nationwide, demonstrating superior communication and persuasive skills.' : 'تحقيق المركز الثاني على مستوى المملكة، مما يبرز مهارات التواصل المتقدمة والقدرة على الإقناع.'"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-24 px-8 max-w-7xl mx-auto">
        <h2 class="text-center text-5xl font-black mb-24 glow-text" x-text="lang === 'en' ? 'Portfolio' : 'المشاريع البرمجية'"></h2>
        <div class="interactive-card p-12 md:p-20 rounded-[4rem] mb-12 border-t-8 border-indigo-600 relative overflow-hidden" data-aos="fade-up">
            <div class="stars-wrapper" id="gradStars"></div>
            <div class="flex flex-col lg:flex-row gap-12 items-center relative z-10">
                <div class="lg:w-2/3">
                    <div class="flex items-center gap-4 mb-6">
                        <span class="bg-indigo-600 text-white px-4 py-1 rounded-full text-[10px] font-bold">GRADE: A+</span>
                        <h3 class="text-4xl font-black">AI-Powered Lawyer System</h3>
                    </div>
                    <p class="text-slate-400 text-xl leading-relaxed mb-8" x-text="lang === 'en' ? 'Advanced system for analyzing legal queries based on Saudi law using NLP.' : 'نظام ذكي لتحليل الاستفسارات القانونية وتقديم استشارات أولية وفق الأنظمة السعودية.'"></p>
                </div>
                <div class="lg:w-1/3 opacity-20 text-center"><i class="fas fa-gavel text-[120px]"></i></div>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-10">
            <div class="interactive-card p-12 rounded-[3rem]" data-aos="zoom-in-right">
                <div class="w-16 h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-400 text-3xl mb-8"><i class="fas fa-heartbeat"></i></div>
                <h3 class="text-2xl font-bold mb-4">VentraCare</h3>
                <p class="text-slate-500 mb-8" x-text="lang === 'en' ? 'Android system for ICU bed management with Firebase integration.' : 'نظام إدارة أسرّة العناية المركزة باستخدام قاعدة بيانات Firebase.'"></p>
                <div class="text-[10px] font-bold text-indigo-500 uppercase">Java • Firebase • Android</div>
            </div>
            <div class="interactive-card p-12 rounded-[3rem]" data-aos="zoom-in-left">
                <div class="w-16 h-16 bg-amber-500/10 rounded-2xl flex items-center justify-center text-amber-400 text-3xl mb-8"><i class="fas fa-balance-scale"></i></div>
                <h3 class="text-2xl font-bold mb-4">LawyerApp</h3>
                <p class="text-slate-500 mb-8" x-text="lang === 'en' ? 'Case management tool integrated with Google Sheets API.' : 'أداة إدارة القضايا القانونية متكاملة مع Google Sheets API.'"></p>
                <div class="text-[10px] font-bold text-indigo-500 uppercase">Java • Google API • UI/UX</div>
            </div>
        </div>
    </section>

    <footer class="py-40 text-center relative border-t border-white/5">
        <h2 class="text-6xl md:text-8xl font-black mb-16 glow-text" data-aos="zoom-in">CONTACT</h2>
        <div class="flex justify-center gap-12 mb-20 text-4xl">
            <a href="mailto:Khalid.fahad.cs@gmail.com" class="hover:text-indigo-400 transition-transform hover:scale-125"><i class="far fa-envelope"></i></a>
            <a href="https://wa.me/966536288355" class="hover:text-green-400 transition-transform hover:scale-125"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p class="text-slate-700 text-[10px] font-bold tracking-[1em] uppercase">© 2026 KHALID ALAMRI</p>
    </footer>

    <script>
        window.onscroll = function() {
            var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            var scrolled = (winScroll / height) * 100;
            document.getElementById("myBar").style.width = scrolled + "%";
        };

        function createStars() {
            const container = document.getElementById('gradStars');
            if (!container) return;
            const fragment = document.createDocumentFragment();
            const starCount = window.innerWidth < 768 ? 40 : 80;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star-particle';
                const size = Math.random() * 3 + 1;
                star.style.cssText = `left: ${Math.random() * 100}%; top: ${Math.random() * 100}%; width: ${size}px; height: ${size}px; animation-delay: ${Math.random() * 5}s;`;
                fragment.appendChild(star);
            }
            container.appendChild(fragment);
        }
        document.addEventListener('DOMContentLoaded', createStars);
    </script>
</body>
</html>
