        :root { --accent: #6366f1; --accent-bright: #818cf8; --bg-deep: #02040a; }

            animation: moveGrid 20s linear infinite;
        }
        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 50px 50px; } }

        .gradient-sphere {
            position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            z-index: -1; filter: blur(80px); pointer-events: none;

        .lang-btn {
            position: relative; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
            z-index: 1;
        }
        .lang-btn::before {
            content: ''; position: absolute; top: 100%; left: 0; width: 100%; height: 100%;
            background: var(--accent); transition: all 0.4s ease; z-index: -1;
        }
        .lang-btn:hover::before { top: 0; }
        .lang-btn:hover { border-color: var(--accent); transform: scale(1.05); color: white; }

        /* بطاقات تفاعلية */
        .interactive-card {
            background: rgba(13, 17, 23, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .interactive-card:hover {
            transform: translateY(-15px) rotateX(4deg);
            border-color: var(--accent);
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.3);
        }

        /* تأثير النجوم المطور لمشروع التخرج */
        .stars-wrapper {
            position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 4rem;
        }
        .star-particle {
            position: absolute; background: white; border-radius: 50%; opacity: 0;
            animation: star-sparkle 3s infinite ease-in-out;
            will-change: transform, opacity;
        }
        @keyframes star-sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 0.8; box-shadow: 0 0 15px white; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        .progress-bar {
            position: fixed; top: 0; left: 0; height: 4px; background: linear-gradient(to right, #6366f1, #a855f7);
            z-index: 100; transition: width 0.1s;
        }

        .wa-float {
            position: fixed; bottom: 30px; left: 30px; width: 64px; height: 64px;
            background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center;

        .wa-float i { font-size: 34px; color: white; line-height: 0; }
        .wa-float:hover { transform: rotate(360deg) scale(1.1); }

        .glow-text {
            background: linear-gradient(135deg, #fff 0%, var(--accent-bright) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        [dir="rtl"] { font-family: 'Cairo', sans-serif; }

    <script>
        // دالة شريط التقدم العلوي
        window.onscroll = function() {
            var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            var scrolled = (winScroll / height) * 100;
            document.getElementById("myBar").style.width = scrolled + "%";
        };

        // دالة إنشاء النجوم الكثيفة تلقائياً
        function createStars() {
            const container = document.getElementById('gradStars');
            const starCount = 100; // يمكنك زيادة هذا الرقم لنجوم أكثر

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star-particle';
                
                // توزيع عشوائي
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const size = Math.random() * 3 + 1; // حجم بين 1 و 4 بكسل
                const delay = Math.random() * 5; // تأخير وميض عشوائي
                const duration = Math.random() * 2 + 2; // سرعة وميض

                star.style.left = x + '%';
                star.style.top = y + '%';
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDelay = delay + 's';
                star.style.animationDuration = duration + 's';

                container.appendChild(star);
            }
        }

        // تشغيل النجوم عند التحميل
        document.addEventListener('DOMContentLoaded', createStars);
    </script>
